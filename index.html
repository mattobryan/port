<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Brian Matoke - AI Systems Engineer & Data Protection Officer. Building AI systems that work in the real world.">
    <title>Brian Matoke - AI Systems Engineer</title>

    <meta property="og:title" content="Brian Matoke — AI Systems Engineer">
    <meta property="og:description" content="Data pipelines, machine learning, adversarial robustness, and the governance to deploy AI safely. Portfolio, projects, and live demos.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Brian Matoke — AI Systems Engineer">
    <meta name="twitter:description" content="Data pipelines, machine learning, adversarial robustness, and the governance to deploy AI safely.">

    <style>
        :root {
            --bg:            #FFFFFF;
            --tile-bg:       #FAFAFB;
            --ink:           #0A0A0B;
            --ink-soft:      #52525B;
            --ink-faint:     #9A9AA2;
            --border:        #E7E7EA;
            --border-strong: #D3D3D9;
            --accent:        #4F46E5;
            --accent-soft:   #EEF0FF;
            --accent-glow:   rgba(79, 70, 229, 0.10);
            --live:          #15803D;
            --live-soft:     #E7F6EC;
            --private:       #8A6D1F;
            --private-soft:  #F5EFDD;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg:            #0A0A0B;
                --tile-bg:       #131316;
                --ink:           #F5F5F7;
                --ink-soft:      #ABABB4;
                --ink-faint:     #6E6E78;
                --border:        #232328;
                --border-strong: #323238;
                --accent:        #8583F0;
                --accent-soft:   #1A1934;
                --accent-glow:   rgba(133, 131, 240, 0.14);
                --live:          #4ADE80;
                --live-soft:     #142218;
                --private:       #E0C36A;
                --private-soft:  #26210F;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Roboto', sans-serif;
            background: var(--bg);
            color: var(--ink);
            line-height: 1.55;
        }

        a { color: inherit; text-decoration: none; }
        a:hover { opacity: 0.72; }

        a:focus-visible, button:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 3px;
            border-radius: 2px;
        }

        button { font: inherit; background: none; border: none; cursor: pointer; color: inherit; }

        /* Topbar */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.9rem 1.5rem;
            background: color-mix(in srgb, var(--bg) 88%, transparent);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        .wordmark { font-size: 13px; font-weight: 700; letter-spacing: 0.04em; flex: 0 0 auto; }

        .topnav { display: flex; gap: 4px; flex-wrap: wrap; }

        .topnav button {
            font-size: 12.5px;
            color: var(--ink-soft);
            font-weight: 500;
            padding: 6px 10px;
            border-radius: 7px;
        }

        .topnav button:hover { color: var(--accent); }
        .topnav button.active { color: var(--accent); background: var(--accent-soft); }

        main { max-width: 1280px; margin: 0 auto; padding: 1.25rem 1.5rem 3rem; }

        .view { display: none; }
        .view.active { display: block; animation: fade-in 220ms ease; }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Generic bento grid used inside views */
        .grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-auto-flow: dense;
            gap: 14px;
        }

        .tile {
            background: var(--tile-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.5rem;
            transition: transform 150ms ease, box-shadow 150ms ease, border-color 150ms ease;
        }

        .tile:hover { border-color: var(--border-strong); box-shadow: 0 10px 28px rgba(10, 10, 11, 0.06); }

        .span-4  { grid-column: span 4; }
        .span-6  { grid-column: span 6; }
        .span-8  { grid-column: span 8; }
        .span-12 { grid-column: span 12; }

        .tile h2, .tile h3 { font-weight: 650; letter-spacing: -0.01em; }

        /* Hero / about tile */
        .tile-hero { position: relative; overflow: hidden; display: flex; gap: 1.5rem; align-items: flex-start; }
        .tile-hero::before {
            content: "";
            position: absolute; inset: 0;
            background: radial-gradient(circle at 100% 0%, var(--accent-glow), transparent 60%);
            pointer-events: none;
        }

        .avatar {
            position: relative;
            width: 76px; height: 76px;
            border-radius: 50%;
            flex: 0 0 auto;
            overflow: hidden;
            background: var(--accent);
            display: flex; align-items: center; justify-content: center;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .avatar-fallback {
            color: #fff; font-size: 26px; font-weight: 700; letter-spacing: 0.02em;
        }

        .hero-body { flex: 1 1 auto; min-width: 0; }

        .eyebrow { font-size: 12px; color: var(--ink-faint); font-weight: 600; letter-spacing: 0.08em; margin-bottom: 0.5rem; }

        .tile-hero h1 { font-size: clamp(26px, 3.6vw, 38px); font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 0.6rem; }

        .role-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 0.85rem; }
        .role-chip { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 999px; background: var(--accent-soft); color: var(--accent); }

        .tile-hero .lede { font-size: 14.5px; color: var(--ink-soft); max-width: 62ch; margin-bottom: 0.65rem; }
        .tile-hero .loc { font-size: 12.5px; color: var(--ink-faint); margin-bottom: 1.1rem; }

        .hero-links { display: flex; gap: 14px; flex-wrap: wrap; }
        .hero-links a { font-size: 13px; font-weight: 500; padding: 7px 13px; border: 1px solid var(--border-strong); border-radius: 999px; }
        .hero-links a:hover { border-color: var(--accent); color: var(--accent); opacity: 1; }

        .jump-links { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 1.25rem; }
        .jump-links button {
            font-size: 12.5px; font-weight: 600; padding: 8px 14px; border-radius: 999px;
            background: var(--tile-bg); border: 1px solid var(--border-strong); color: var(--ink);
        }
        .jump-links button:hover { border-color: var(--accent); color: var(--accent); }

        /* Languages tile */
        .lang-donut-row { display: flex; align-items: center; gap: 1.25rem; margin: 0.9rem 0 1.1rem; }
        .lang-donut { width: 108px; height: 108px; border-radius: 50%; flex: 0 0 auto; position: relative; }
        .lang-donut::after { content: ""; position: absolute; inset: 20px; border-radius: 50%; background: var(--tile-bg); }
        .lang-legend { display: flex; flex-direction: column; gap: 7px; flex: 1 1 auto; }
        .lang-chip { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--ink-soft); }
        .lang-chip .lang-chip-name { display: inline-flex; align-items: center; gap: 6px; }
        .lang-chip .lang-chip-pct { font-variant-numeric: tabular-nums; color: var(--ink-faint); }
        .lang-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex: 0 0 auto; }
        .lang-note { font-size: 11px; color: var(--ink-faint); margin-bottom: 1.1rem; line-height: 1.5; }

        .tag-row { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { font-size: 12px; padding: 5px 10px; border-radius: 999px; background: var(--accent-soft); color: var(--accent); font-weight: 500; }

        h2.section-title { font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 0.75rem; }

        /* Projects view: sidebar + detail */
        .projects-shell { display: grid; grid-template-columns: 240px 1fr; gap: 14px; align-items: start; }

        .projects-sidebar {
            background: var(--tile-bg); border: 1px solid var(--border); border-radius: 14px;
            padding: 0.6rem; position: sticky; top: 70px;
        }
        .project-nav-item {
            display: flex; align-items: center; justify-content: space-between; gap: 8px;
            width: 100%; text-align: left; padding: 9px 10px; border-radius: 9px; font-size: 13px; font-weight: 500;
            color: var(--ink-soft);
        }
        .project-nav-item:hover { background: var(--border); color: var(--ink); }
        .project-nav-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
        .project-nav-item .dot { width: 6px; height: 6px; border-radius: 50%; flex: 0 0 auto; }
        .project-nav-item .dot.live { background: var(--live); }
        .project-nav-item .dot.private { background: var(--private); }

        .project-detail { background: var(--tile-bg); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; min-height: 320px; }

        .card-head { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 0.5rem; }
        .card-head h3 { font-size: 18px; }
        .card-summary { font-size: 14px; color: var(--ink-soft); margin-bottom: 0.85rem; }
        .card-story { font-size: 13px; color: var(--ink-soft); margin-bottom: 0.9rem; line-height: 1.7; }
        .card-story strong { color: var(--ink); font-weight: 600; }
        .card-meta { font-size: 11.5px; color: var(--ink-faint); margin-bottom: 0.9rem; }
        .card-actions { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; }
        .card-actions a { font-size: 13px; font-weight: 500; border-bottom: 1px solid var(--border-strong); }
        .card-actions a:hover { border-color: var(--accent); color: var(--accent); opacity: 1; }

        .badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; }
        .badge-live { background: var(--live-soft); color: var(--live); }
        .badge-live::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--live); display: inline-block; }
        .badge-private { background: var(--private-soft); color: var(--private); }
        .private-note { font-size: 12px; color: var(--ink-faint); }

        .demo-embed {
            border-radius: 10px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 1rem;
        }
        .demo-embed .chrome-bar {
            display: flex; align-items: center; gap: 6px; padding: 7px 9px;
            background: var(--bg); border-bottom: 1px solid var(--border);
        }
        .chrome-dot { width: 7px; height: 7px; border-radius: 50%; flex: 0 0 auto; }
        .chrome-dot.r { background: #EF6A5F; }
        .chrome-dot.y { background: #F5BD4F; }
        .chrome-dot.g { background: #61C454; }
        .demo-embed .chrome-url {
            margin-left: 6px; font-size: 10.5px; color: var(--ink-faint); background: var(--tile-bg);
            padding: 3px 10px; border-radius: 6px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .demo-embed .chrome-url a { color: inherit; }
        .demo-embed iframe { display: block; width: 100%; height: 460px; border: 0; background: var(--bg); }

        .cta-tile { display: flex; flex-direction: column; justify-content: center; align-items: flex-start; gap: 0.5rem; }
        .cta-tile h3 { font-size: 15px; }
        .cta-tile p { font-size: 12.5px; color: var(--ink-soft); }
        .cta-tile .cta-link { font-size: 13px; font-weight: 600; color: var(--accent); }

        /* Research / education / writing */
        .tile-research h3 { font-size: 14.5px; margin-bottom: 0.4rem; }
        .tile-research p.desc { font-size: 12.5px; color: var(--ink-soft); margin-bottom: 0.6rem; line-height: 1.6; }
        .tile-research .meta { font-size: 11.5px; color: var(--ink-faint); }

        .timeline-item { margin-bottom: 1rem; }
        .timeline-item:last-child { margin-bottom: 0; }
        .timeline-item h3 { font-size: 14px; margin-bottom: 0.2rem; }
        .timeline-item p { font-size: 12.5px; color: var(--ink-soft); }

        .writing-text { font-size: 13px; color: var(--ink-soft); line-height: 1.6; margin-bottom: 0.85rem; }

        /* Contact */
        .tile-contact { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; padding: 1.1rem 1.5rem; }
        .tile-contact .footer-label { font-size: 13px; color: var(--ink-soft); }
        .footer-links { display: flex; gap: 1rem; flex-wrap: wrap; font-size: 13.5px; font-weight: 500; }
        .divider { color: var(--ink-faint); }

        .data-error { font-size: 13px; color: var(--ink-soft); padding: 2rem; text-align: center; }

        /* Tablet */
        @media (max-width: 900px) {
            .span-4, .span-6, .span-8 { grid-column: span 6; }
            .projects-shell { grid-template-columns: 1fr; }
            .projects-sidebar { position: static; display: flex; flex-wrap: wrap; gap: 6px; }
            .project-nav-item { width: auto; }
        }

        /* Mobile */
        @media (max-width: 620px) {
            main { padding: 1rem 1rem 2.5rem; }
            .grid { gap: 10px; }
            .topbar { padding: 0.8rem 1rem; gap: 0.75rem; }
            .topnav { flex-wrap: nowrap; overflow-x: auto; gap: 4px; scrollbar-width: none; }
            .topnav::-webkit-scrollbar { display: none; }
            .topnav button { flex: 0 0 auto; }
            .span-4, .span-6, .span-8, .span-12 { grid-column: span 12; }
            .tile, .project-detail { padding: 1.25rem; }
            .tile-hero { flex-direction: column; }
            .demo-embed iframe { height: 320px; }
        }

        @media (prefers-reduced-motion: reduce) {
            .view.active { animation: none; }
        }
    </style>
</head>
<body>
    <nav class="topbar">
        <span class="wordmark" id="wordmark">PORTFOLIO</span>
        <div class="topnav" id="topnav">
            <button data-view="home">Home</button>
            <button data-view="projects">Projects</button>
            <button data-view="research">Research</button>
            <button data-view="education">Education</button>
            <button data-view="writing">Writing</button>
            <button data-view="contact">Contact</button>
        </div>
    </nav>

    <main id="app">
        <div class="data-error" id="loading">Loading…</div>
    </main>

    <script>
    (function () {
        var VIEWS = ['home', 'projects', 'research', 'education', 'writing', 'contact'];
        var app = document.getElementById('app');
        var topnav = document.getElementById('topnav');
        var currentProjectId = null;
        var DATA = null;

        function esc(s) {
            return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
            });
        }

        function donutGradient(stats) {
            var acc = 0, stops = [];
            stats.forEach(function (s) {
                var start = acc, end = acc + s.pct;
                stops.push(s.color + ' ' + start + '% ' + end + '%');
                acc = end;
            });
            return 'conic-gradient(' + stops.join(', ') + ')';
        }

        function renderHome() {
            var p = DATA.profile;
            var initials = esc(p.initials || '');
            return (
                '<div class="grid">' +
                '<div class="tile tile-hero span-8">' +
                    '<div class="avatar">' +
                        '<img src="' + esc(p.avatar) + '" alt="Photo of ' + esc(p.name) + '" ' +
                            'onerror="this.style.display=\'none\'">' +
                        '<span class="avatar-fallback">' + initials + '</span>' +
                    '</div>' +
                    '<div class="hero-body">' +
                        '<p class="eyebrow">' + esc((p.roles || [])[0] || '') + '</p>' +
                        '<h1>' + esc(p.name) + '</h1>' +
                        '<div class="role-row">' + (p.roles || []).map(function (r) { return '<span class="role-chip">' + esc(r) + '</span>'; }).join('') + '</div>' +
                        '<p class="lede">' + esc(p.tagline) + '</p>' +
                        (p.bio || []).map(function (para) { return '<p class="lede">' + esc(para) + '</p>'; }).join('') +
                        '<p class="loc">' + esc(p.location) + '</p>' +
                        '<div class="hero-links">' +
                            (p.links || []).map(function (l) {
                                var external = /^https?:/.test(l.url);
                                return '<a href="' + esc(l.url) + '"' + (external ? ' target="_blank" rel="noopener"' : '') + '>' + esc(l.label) + '</a>';
                            }).join('') +
                        '</div>' +
                        '<div class="jump-links">' +
                            '<button data-view="projects">See my projects →</button>' +
                            '<button data-view="research">Research & work →</button>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
                '<div class="tile span-4">' +
                    '<h2 class="section-title">Languages · across all repos</h2>' +
                    '<div class="lang-donut-row">' +
                        '<div class="lang-donut" style="background:' + donutGradient(DATA.languages.stats) + '" role="img" aria-label="Language usage breakdown"></div>' +
                        '<div class="lang-legend">' +
                            DATA.languages.stats.map(function (s) {
                                return '<span class="lang-chip"><span class="lang-chip-name"><span class="lang-dot" style="background:' + s.color + '"></span>' + esc(s.name) + '</span><span class="lang-chip-pct">' + s.pct + '%</span></span>';
                            }).join('') +
                        '</div>' +
                    '</div>' +
                    '<p class="lang-note">' + esc(DATA.languages.note) + ' (' + DATA.languages.repoCount + ' repos, last updated ' + esc(DATA.languages.updatedAt) + ')</p>' +
                    '<h2 class="section-title">Focus areas</h2>' +
                    '<div class="tag-row">' + DATA.focusAreas.map(function (t) { return '<span class="tag">' + esc(t) + '</span>'; }).join('') + '</div>' +
                '</div>' +
                '</div>'
            );
        }

        function projectDemoBlock(proj) {
            if (!proj.demoUrl) return '';
            return (
                '<div class="demo-embed">' +
                    '<div class="chrome-bar">' +
                        '<span class="chrome-dot r"></span><span class="chrome-dot y"></span><span class="chrome-dot g"></span>' +
                        '<span class="chrome-url"><a href="' + esc(proj.demoUrl) + '" target="_blank" rel="noopener">' + esc(proj.demoUrl.replace(/^https?:\/\//, '')) + '</a></span>' +
                    '</div>' +
                    '<iframe src="' + esc(proj.demoUrl) + '" loading="lazy" title="Live demo of ' + esc(proj.name) + '" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>' +
                '</div>'
            );
        }

        function projectDetailHtml(proj) {
            var badge = proj.visibility === 'private'
                ? '<span class="badge badge-private">🔒 Private</span>'
                : (proj.demoUrl ? '<span class="badge badge-live">Live Demo</span>' : '');
            var story = '<strong>Problem:</strong> ' + esc(proj.problem) + ' <strong>Approach:</strong> ' + esc(proj.approach) + ' <strong>Outcome:</strong> ' + esc(proj.outcome);
            var actions = '';
            if (proj.demoUrl) actions += '<a href="' + esc(proj.demoUrl) + '" target="_blank" rel="noopener">Open in new tab ↗</a>';
            if (proj.repoUrl) actions += '<a href="' + esc(proj.repoUrl) + '" target="_blank" rel="noopener">View on GitHub</a>';
            if (!proj.demoUrl && !proj.repoUrl) actions = '<span class="private-note">Not yet public.</span>';

            return (
                '<div class="card-head"><h3>' + esc(proj.name) + '</h3>' + badge + '</div>' +
                projectDemoBlock(proj) +
                '<p class="card-summary">' + esc(proj.summary) + '</p>' +
                '<p class="card-story">' + story + '</p>' +
                '<p class="card-meta">' + esc(proj.stack) + '</p>' +
                '<div class="card-actions">' + actions + '</div>'
            );
        }

        function renderProjectsSidebar() {
            return DATA.projects.map(function (proj) {
                var dotClass = proj.visibility === 'private' ? 'private' : 'live';
                var active = proj.id === currentProjectId ? ' active' : '';
                return '<button class="project-nav-item' + active + '" data-project="' + esc(proj.id) + '">' +
                    '<span>' + esc(proj.name) + '</span><span class="dot ' + dotClass + '"></span></button>';
            }).join('');
        }

        function renderProjects() {
            if (!currentProjectId && DATA.projects.length) currentProjectId = DATA.projects[0].id;
            var proj = DATA.projects.find(function (p) { return p.id === currentProjectId; }) || DATA.projects[0];
            return (
                '<div class="projects-shell">' +
                    '<div class="projects-sidebar" id="projects-sidebar">' + renderProjectsSidebar() + '</div>' +
                    '<div class="project-detail" id="project-detail">' + (proj ? projectDetailHtml(proj) : '') + '</div>' +
                '</div>'
            );
        }

        function selectProject(id) {
            currentProjectId = id;
            document.getElementById('projects-sidebar').innerHTML = renderProjectsSidebar();
            var proj = DATA.projects.find(function (p) { return p.id === id; });
            document.getElementById('project-detail').innerHTML = proj ? projectDetailHtml(proj) : '';
            bindProjectSidebar();
        }

        function bindProjectSidebar() {
            var sidebar = document.getElementById('projects-sidebar');
            if (!sidebar) return;
            sidebar.querySelectorAll('[data-project]').forEach(function (btn) {
                btn.addEventListener('click', function () { selectProject(btn.dataset.project); });
            });
        }

        function renderResearch() {
            return '<div class="grid">' + DATA.research.map(function (r) {
                return '<div class="tile tile-research span-4"><h3>' + esc(r.name) + '</h3><p class="desc">' + esc(r.desc) + '</p><p class="meta">' + esc(r.meta) + '</p></div>';
            }).join('') + '</div>';
        }

        function renderEducation() {
            return '<div class="grid"><div class="tile span-12"><h2 class="section-title">Education & Credentials</h2>' +
                DATA.education.map(function (e) {
                    return '<div class="timeline-item"><h3>' + esc(e.name) + '</h3><p>' + esc(e.meta) + '</p></div>';
                }).join('') + '</div></div>';
        }

        function renderWriting() {
            return '<div class="grid"><div class="tile span-12"><h2 class="section-title">Writing & Community</h2>' +
                '<p class="writing-text">' + esc(DATA.writing.text) + '</p>' +
                '<a href="' + esc(DATA.writing.url) + '" target="_blank" rel="noopener" style="font-size:13px; font-weight:600; color: var(--accent);">Read on Medium ↗</a>' +
                '</div></div>';
        }

        function renderContact() {
            var c = DATA.contact;
            return '<div class="grid"><div class="tile tile-contact span-12">' +
                '<span class="footer-label">Get in touch</span>' +
                '<div class="footer-links"><a href="mailto:' + esc(c.email) + '">' + esc(c.email) + '</a><span class="divider">•</span><a href="tel:' + esc(c.phone.replace(/\s/g, '')) + '">' + esc(c.phone) + '</a></div>' +
                '</div></div>';
        }

        var RENDERERS = { home: renderHome, projects: renderProjects, research: renderResearch, education: renderEducation, writing: renderWriting, contact: renderContact };

        function showView(name) {
            if (VIEWS.indexOf(name) === -1) name = 'home';
            app.innerHTML = '<div class="view active" id="view-' + name + '">' + RENDERERS[name]() + '</div>';
            if (name === 'projects') bindProjectSidebar();
            topnav.querySelectorAll('button').forEach(function (b) {
                b.classList.toggle('active', b.dataset.view === name);
            });
            if (location.hash.slice(1) !== name) history.replaceState(null, '', '#' + name);
            window.scrollTo({ top: 0, behavior: 'auto' });
        }

        function bindNav() {
            document.body.addEventListener('click', function (e) {
                var btn = e.target.closest('[data-view]');
                if (btn) showView(btn.dataset.view);
            });
            window.addEventListener('hashchange', function () { showView(location.hash.slice(1)); });
        }

        function boot(data) {
            DATA = data;
            document.getElementById('wordmark').textContent = (data.profile.name || '').toUpperCase();
            document.title = data.profile.name + ' - ' + (data.profile.roles || [])[0];
            bindNav();
            showView(location.hash.slice(1) || 'home');
        }

        fetch('data/projects.json')
            .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
            .then(boot)
            .catch(function (err) {
                app.innerHTML = '<div class="data-error">Could not load site content (' + esc(err.message) + '). Try refreshing.</div>';
            });
    })();
    </script>
</body>
</html>
