<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Brian Matoke - AI Systems Engineer & Data Protection Officer. Building AI systems that work in the real world.">
    <title>Brian Matoke - AI Systems Engineer</title>

    <meta property="og:title" content="Brian Matoke — AI Systems Engineer">
    <meta property="og:description" content="Data pipelines, machine learning, adversarial robustness, and the governance to deploy AI safely. Portfolio, projects, and live demos.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Brian Matoke — AI Systems Engineer">
    <meta name="twitter:description" content="Data pipelines, machine learning, adversarial robustness, and the governance to deploy AI safely.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">

    <style>
        :root {
            --bg:            #FAFAF9;
            --tile-bg:       rgba(255, 255, 255, 0.78);
            --tile-solid:    #FFFFFF;
            --ink:           #0A0A0B;
            --ink-soft:      #52525B;
            --ink-faint:     #8E8E96;
            --border:        rgba(10, 10, 11, 0.09);
            --border-strong: rgba(10, 10, 11, 0.18);
            --accent:        #4F46E5;
            --accent-2:      #9333EA;
            --accent-soft:   #EEF0FF;
            --accent-glow:   rgba(79, 70, 229, 0.12);
            --live:          #15803D;
            --live-soft:     #E7F6EC;
            --private:       #8A6D1F;
            --private-soft:  #F5EFDD;
            --net-node:      rgba(79, 70, 229, 0.35);
            --net-line:      rgba(79, 70, 229, 0.14);
            --net-pulse:     rgba(147, 51, 234, 0.75);
            --shadow:        0 12px 32px rgba(10, 10, 11, 0.08);
            /* language palette — validated for light surfaces */
            --lang-python:   #3572A5;
            --lang-js:       #B08800;
            --lang-kotlin:   #A97BFF;
            --lang-ts:       #3178C6;
            --lang-html:     #E34C26;
            --lang-other:    #9CA3AF;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg:            #09090B;
                --tile-bg:       rgba(19, 19, 23, 0.82);
                --tile-solid:    #131317;
                --ink:           #F5F5F7;
                --ink-soft:      #ABABB4;
                --ink-faint:     #71717A;
                --border:        rgba(245, 245, 247, 0.09);
                --border-strong: rgba(245, 245, 247, 0.2);
                --accent:        #8583F0;
                --accent-2:      #C084FC;
                --accent-soft:   #1B1A38;
                --accent-glow:   rgba(133, 131, 240, 0.16);
                --live:          #4ADE80;
                --live-soft:     #142218;
                --private:       #E0C36A;
                --private-soft:  #26210F;
                --net-node:      rgba(133, 131, 240, 0.4);
                --net-line:      rgba(133, 131, 240, 0.13);
                --net-pulse:     rgba(192, 132, 252, 0.8);
                --shadow:        0 12px 32px rgba(0, 0, 0, 0.4);
                /* language palette — validated for dark surfaces */
                --lang-kotlin:   #9C6BFA;
                --lang-other:    #7A7A85;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--ink);
            line-height: 1.55;
            overflow-x: hidden;
        }

        h1, h2, h3, .wordmark { font-family: 'Sora', 'Inter', -apple-system, sans-serif; }

        a { color: inherit; text-decoration: none; }

        a:focus-visible, button:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 3px;
            border-radius: 4px;
        }

        button { font: inherit; background: none; border: none; cursor: pointer; color: inherit; }

        /* Node-network background */
        #bg-net {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .bg-glow {
            position: fixed;
            z-index: 0;
            pointer-events: none;
            width: 55vw; height: 55vw;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.55;
        }
        .bg-glow.a { top: -20vw; right: -15vw; background: radial-gradient(circle, var(--accent-glow), transparent 65%); }
        .bg-glow.b { bottom: -25vw; left: -18vw; background: radial-gradient(circle, var(--accent-glow), transparent 65%); }

        /* Topbar */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.85rem 1.5rem;
            background: color-mix(in srgb, var(--bg) 72%, transparent);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
        }

        .wordmark { font-size: 13px; font-weight: 700; letter-spacing: 0.05em; flex: 0 0 auto; }
        .wordmark .dot { color: var(--accent); }

        .topnav { position: relative; display: flex; gap: 2px; flex-wrap: wrap; }

        .nav-pill {
            position: absolute;
            top: 0;
            height: 100%;
            border-radius: 9px;
            background: var(--accent-soft);
            border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
            transition: left 260ms cubic-bezier(.5,.1,.2,1), width 260ms cubic-bezier(.5,.1,.2,1);
            pointer-events: none;
        }

        .topnav button {
            position: relative;
            font-size: 12.5px;
            color: var(--ink-soft);
            font-weight: 500;
            padding: 7px 12px;
            border-radius: 9px;
            transition: color 160ms ease;
            z-index: 1;
        }

        .topnav button:hover { color: var(--accent); }
        .topnav button.active { color: var(--accent); font-weight: 600; }

        main { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 1.5rem 1.5rem 3.5rem; }

        .view { display: none; }
        .view.active { display: block; }

        /* Staggered tile entrance */
        .view.active .tile, .view.active .projects-sidebar, .view.active .project-detail {
            animation: rise 480ms cubic-bezier(.2,.6,.2,1) both;
            animation-delay: calc(var(--i, 0) * 70ms);
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(14px) scale(0.99); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(12, 1fr); grid-auto-flow: dense; gap: 16px; }

        .tile {
            position: relative;
            background: var(--tile-bg);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 1.6rem;
            transition: transform 200ms cubic-bezier(.2,.6,.2,1), box-shadow 200ms ease, border-color 200ms ease;
        }

        .tile:hover {
            transform: translateY(-3px);
            border-color: color-mix(in srgb, var(--accent) 32%, var(--border));
            box-shadow: var(--shadow), 0 0 0 1px var(--accent-glow), 0 0 44px -12px var(--accent-glow);
        }

        .span-4  { grid-column: span 4; }
        .span-6  { grid-column: span 6; }
        .span-8  { grid-column: span 8; }
        .span-12 { grid-column: span 12; }

        .tile h2, .tile h3 { font-weight: 700; letter-spacing: -0.015em; }

        /* Hero */
        .tile-hero { overflow: hidden; display: flex; gap: 1.75rem; align-items: flex-start; }
        .tile-hero::before {
            content: "";
            position: absolute; inset: 0;
            background:
                radial-gradient(circle at 100% 0%, var(--accent-glow), transparent 55%),
                linear-gradient(160deg, transparent 60%, var(--accent-glow) 130%);
            pointer-events: none;
        }

        .avatar-ring {
            position: relative;
            flex: 0 0 auto;
            width: 92px; height: 92px;
            border-radius: 50%;
            padding: 3px;
        }
        .avatar-ring::before {
            content: "";
            position: absolute; inset: 0;
            border-radius: 50%;
            background: conic-gradient(from var(--ring-angle, 0deg), var(--accent), var(--accent-2), transparent 55%, var(--accent));
            animation: ring-spin 9s linear infinite;
        }
        @property --ring-angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
        @keyframes ring-spin { to { --ring-angle: 360deg; } }

        .avatar {
            position: relative;
            width: 100%; height: 100%;
            border-radius: 50%;
            overflow: hidden;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            display: flex; align-items: center; justify-content: center;
            border: 3px solid var(--bg);
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .avatar-fallback { color: #fff; font-size: 30px; font-weight: 700; font-family: 'Sora', sans-serif; }

        .hero-body { flex: 1 1 auto; min-width: 0; position: relative; }

        .eyebrow { font-size: 12px; color: var(--ink-faint); font-weight: 600; letter-spacing: 0.1em; margin-bottom: 0.5rem; text-transform: uppercase; }

        .tile-hero h1 {
            font-size: clamp(28px, 4vw, 44px);
            font-weight: 800;
            letter-spacing: -0.025em;
            line-height: 1.08;
            margin-bottom: 0.65rem;
        }

        .role-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; }
        .role-chip {
            font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 999px;
            background: var(--accent-soft); color: var(--accent);
            border: 1px solid color-mix(in srgb, var(--accent) 20%, transparent);
        }

        .tile-hero .lede { font-size: 14.5px; color: var(--ink-soft); max-width: 62ch; margin-bottom: 0.7rem; }
        .tile-hero .lede.tag-line { font-size: 16px; font-weight: 600; color: var(--ink); }
        .tile-hero .loc { font-size: 12.5px; color: var(--ink-faint); margin: 0.4rem 0 1.2rem; }

        .stat-strip { display: flex; gap: 2rem; flex-wrap: wrap; margin-bottom: 1.3rem; }
        .stat b { display: block; font-family: 'Sora', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: -0.02em; color: var(--ink); line-height: 1.15; }
        .stat span { font-size: 11.5px; color: var(--ink-faint); font-weight: 500; }

        .hero-links { display: flex; gap: 10px; flex-wrap: wrap; }
        .hero-links a {
            font-size: 13px; font-weight: 500; padding: 8px 15px;
            border: 1px solid var(--border-strong); border-radius: 999px;
            transition: border-color 160ms ease, color 160ms ease, transform 160ms ease;
        }
        .hero-links a:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }

        .jump-links { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 1.3rem; }
        .jump-links button {
            font-size: 13px; font-weight: 600; padding: 10px 18px; border-radius: 999px;
            transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease, color 160ms ease;
        }
        .jump-links button.primary {
            background: linear-gradient(120deg, var(--accent), var(--accent-2));
            color: #fff;
            box-shadow: 0 6px 20px -6px var(--accent);
        }
        .jump-links button.primary:hover { transform: translateY(-2px); box-shadow: 0 10px 26px -6px var(--accent); }
        .jump-links button.ghost { border: 1px solid var(--border-strong); color: var(--ink); background: transparent; }
        .jump-links button.ghost:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }

        /* Donut (SVG) */
        .donut-wrap { position: relative; display: flex; align-items: center; gap: 1.4rem; margin: 1rem 0 1.15rem; }
        .donut-svg { flex: 0 0 auto; width: 128px; height: 128px; }
        .donut-svg .seg {
            fill: none;
            stroke-width: 15;
            transition: stroke-dashoffset 900ms cubic-bezier(.3,.6,.2,1), stroke-width 160ms ease, opacity 160ms ease;
        }
        .donut-svg .seg:hover, .donut-svg .seg.hl { stroke-width: 19; }
        .donut-svg.dimmed .seg:not(:hover):not(.hl) { opacity: 0.35; }
        .donut-center { pointer-events: none; }
        .donut-center b { font-family: 'Sora', sans-serif; font-size: 21px; font-weight: 700; fill: var(--ink); }
        .donut-center span, .donut-center .sub { font-size: 9.5px; fill: var(--ink-faint); font-weight: 500; }

        .donut-tip {
            position: absolute;
            z-index: 5;
            background: var(--tile-solid);
            border: 1px solid var(--border-strong);
            box-shadow: var(--shadow);
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            pointer-events: none;
            white-space: nowrap;
            display: none;
        }
        .donut-tip .pct { color: var(--ink-faint); font-weight: 500; }

        .lang-legend { display: flex; flex-direction: column; gap: 7px; flex: 1 1 auto; }
        .lang-chip { display: flex; align-items: center; justify-content: space-between; font-size: 12.5px; color: var(--ink-soft); cursor: default; border-radius: 6px; padding: 1px 4px; }
        .lang-chip:hover { background: var(--accent-soft); }
        .lang-chip .lang-chip-name { display: inline-flex; align-items: center; gap: 7px; }
        .lang-chip .lang-chip-pct { font-variant-numeric: tabular-nums; color: var(--ink-faint); }
        .lang-dot { width: 9px; height: 9px; border-radius: 3px; display: inline-block; flex: 0 0 auto; }
        .lang-note { font-size: 11px; color: var(--ink-faint); margin-bottom: 1.1rem; line-height: 1.5; }

        .tag-row { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag {
            font-size: 12px; padding: 5px 11px; border-radius: 999px;
            background: var(--accent-soft); color: var(--accent); font-weight: 500;
            border: 1px solid color-mix(in srgb, var(--accent) 15%, transparent);
        }

        h2.section-title { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 0.8rem; }

        /* Projects view */
        .projects-shell { display: grid; grid-template-columns: 250px 1fr; gap: 16px; align-items: start; }

        .projects-sidebar {
            background: var(--tile-bg);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 0.65rem;
            position: sticky;
            top: 72px;
        }
        .project-nav-item {
            display: flex; align-items: center; justify-content: space-between; gap: 8px;
            width: 100%; text-align: left; padding: 10px 12px; border-radius: 11px;
            font-size: 13px; font-weight: 500; color: var(--ink-soft);
            transition: background 140ms ease, color 140ms ease, transform 140ms ease;
        }
        .project-nav-item:hover { background: var(--accent-soft); color: var(--ink); transform: translateX(2px); }
        .project-nav-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; box-shadow: inset 2px 0 0 var(--accent); }
        .project-nav-item .dot { width: 7px; height: 7px; border-radius: 50%; flex: 0 0 auto; }
        .project-nav-item .dot.live { background: var(--live); box-shadow: 0 0 6px var(--live); }
        .project-nav-item .dot.private { background: var(--private); }

        .project-detail {
            background: var(--tile-bg);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 1.6rem;
            min-height: 320px;
        }
        .project-detail.swap > * { animation: rise 320ms cubic-bezier(.2,.6,.2,1) both; }

        .card-head { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 0.6rem; }
        .card-head h3 { font-size: 19px; }
        .card-summary { font-size: 14px; color: var(--ink-soft); margin-bottom: 0.9rem; }
        .card-story { font-size: 13px; color: var(--ink-soft); margin-bottom: 0.95rem; line-height: 1.7; }
        .card-story strong { color: var(--ink); font-weight: 600; }
        .card-meta { font-size: 11.5px; color: var(--ink-faint); margin-bottom: 0.95rem; }
        .card-actions { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; margin-bottom: 0.5rem; }
        .card-actions a {
            font-size: 13px; font-weight: 500;
            background-image: linear-gradient(var(--accent), var(--accent));
            background-size: 0% 1.5px; background-repeat: no-repeat; background-position: 0 100%;
            padding-bottom: 2px;
            transition: background-size 200ms ease, color 160ms ease;
        }
        .card-actions a:hover { color: var(--accent); background-size: 100% 1.5px; }

        .badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 999px; }
        .badge-live { background: var(--live-soft); color: var(--live); }
        .badge-live::before {
            content: ""; width: 6px; height: 6px; border-radius: 50%;
            background: var(--live); display: inline-block;
            animation: pulse-dot 2.2s ease-in-out infinite;
        }
        @keyframes pulse-dot { 0%, 100% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--live) 45%, transparent); } 55% { box-shadow: 0 0 0 5px transparent; } }
        .badge-private { background: var(--private-soft); color: var(--private); }
        .private-note { font-size: 12px; color: var(--ink-faint); }

        .demo-embed { position: relative; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 1.05rem; background: var(--tile-solid); }
        .demo-embed .chrome-bar {
            display: flex; align-items: center; gap: 6px; padding: 8px 10px;
            background: color-mix(in srgb, var(--tile-solid) 70%, var(--bg));
            border-bottom: 1px solid var(--border);
        }
        .chrome-dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; }
        .chrome-dot.r { background: #EF6A5F; }
        .chrome-dot.y { background: #F5BD4F; }
        .chrome-dot.g { background: #61C454; }
        .demo-embed .chrome-url {
            margin-left: 6px; font-size: 10.5px; color: var(--ink-faint); background: var(--bg);
            padding: 3px 11px; border-radius: 6px; flex: 1;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .demo-embed iframe { display: block; width: 100%; height: 460px; border: 0; background: var(--tile-solid); position: relative; z-index: 1; }
        .demo-loading {
            position: absolute; inset: 37px 0 0; z-index: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .spinner {
            width: 26px; height: 26px; border-radius: 50%;
            border: 3px solid var(--accent-soft); border-top-color: var(--accent);
            animation: spin 800ms linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Research / education / writing */
        .tile-research h3 { font-size: 15px; margin-bottom: 0.45rem; }
        .tile-research p.desc { font-size: 12.5px; color: var(--ink-soft); margin-bottom: 0.7rem; line-height: 1.65; }
        .tile-research .meta { font-size: 11.5px; color: var(--ink-faint); }

        .timeline { position: relative; padding-left: 22px; }
        .timeline::before {
            content: ""; position: absolute; left: 4px; top: 6px; bottom: 6px; width: 2px;
            background: linear-gradient(var(--accent), var(--accent-2), transparent);
            border-radius: 2px;
        }
        .timeline-item { position: relative; margin-bottom: 1.15rem; }
        .timeline-item:last-child { margin-bottom: 0; }
        .timeline-item::before {
            content: ""; position: absolute; left: -22px; top: 5px;
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--accent); border: 2px solid var(--bg);
        }
        .timeline-item h3 { font-size: 14px; margin-bottom: 0.2rem; }
        .timeline-item p { font-size: 12.5px; color: var(--ink-soft); }

        .writing-text { font-size: 13px; color: var(--ink-soft); line-height: 1.65; margin-bottom: 0.9rem; }
        .accent-link { font-size: 13px; font-weight: 600; color: var(--accent); }
        .accent-link:hover { text-decoration: underline; }

        /* Contact */
        .tile-contact { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; padding: 1.3rem 1.6rem; }
        .tile-contact .footer-label { font-size: 13px; color: var(--ink-soft); }
        .footer-links { display: flex; gap: 1rem; flex-wrap: wrap; font-size: 13.5px; font-weight: 500; }
        .footer-links a:hover { color: var(--accent); }
        .divider { color: var(--ink-faint); }

        .data-error { font-size: 13px; color: var(--ink-soft); padding: 2rem; text-align: center; }

        /* Kinetic hero name */
        .kin-w { display: inline-block; white-space: pre; }
        .kin-l {
            display: inline-block;
            animation: kin-rise 620ms cubic-bezier(.2,.65,.25,1) both;
            animation-delay: calc(120ms + var(--d) * 34ms);
        }
        @keyframes kin-rise {
            from { opacity: 0; transform: translateY(0.55em) rotate(5deg); }
            to { opacity: 1; transform: none; }
        }

        /* Magnetic buttons */
        .magnetic { display: inline-block; transition: transform 220ms cubic-bezier(.2,.6,.2,1); will-change: transform; }

        /* Forms */
        .cform .frow { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .fgroup { margin-bottom: 14px; }
        .fgroup label {
            display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
            text-transform: uppercase; color: var(--ink-faint); margin-bottom: 6px;
        }
        .fgroup input, .fgroup textarea {
            width: 100%; background: var(--bg); border: 1px solid var(--border-strong);
            border-radius: 11px; padding: 11px 13px; font: inherit; font-size: 14px;
            color: var(--ink); transition: border-color 150ms ease, box-shadow 150ms ease;
        }
        .fgroup textarea { resize: vertical; min-height: 110px; }
        .fgroup input:focus, .fgroup textarea:focus {
            border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .hp { position: absolute; left: -9999px; opacity: 0; height: 0; width: 0; }
        .submit-btn {
            background: linear-gradient(120deg, var(--accent), var(--accent-2));
            color: #fff; font-weight: 600; font-size: 13px; padding: 11px 20px;
            border-radius: 999px; box-shadow: 0 6px 20px -6px var(--accent);
            transition: transform 160ms ease, box-shadow 160ms ease, opacity 160ms ease;
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 26px -6px var(--accent); }
        .submit-btn:disabled { opacity: 0.55; cursor: default; transform: none; }
        .form-status { font-size: 12.5px; margin-top: 10px; color: var(--ink-faint); min-height: 1.2em; }
        .form-status.ok { color: var(--live); }
        .form-status.err { color: #D33F49; }

        .contact-direct { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.4rem; }
        .contact-direct a {
            display: flex; align-items: center; gap: 10px; font-size: 13.5px; font-weight: 500;
            padding: 10px 13px; border: 1px solid var(--border); border-radius: 11px;
            transition: border-color 150ms ease, color 150ms ease, transform 150ms ease;
        }
        .contact-direct a:hover { border-color: var(--accent); color: var(--accent); transform: translateX(2px); }
        .contact-direct .ico { font-size: 15px; }

        /* Medium article list */
        .article-list { display: flex; flex-direction: column; }
        .article-item {
            display: flex; align-items: baseline; justify-content: space-between; gap: 16px;
            padding: 13px 6px; border-bottom: 1px solid var(--border);
            transition: background 140ms ease, transform 140ms ease;
        }
        .article-item:last-child { border-bottom: none; }
        .article-item:hover { background: var(--accent-soft); border-radius: 9px; transform: translateX(3px); }
        .article-item .a-title { font-size: 14px; font-weight: 500; line-height: 1.45; }
        .article-item:hover .a-title { color: var(--accent); }
        .article-item .a-date {
            font-size: 11.5px; color: var(--ink-faint); flex: 0 0 auto;
            font-variant-numeric: tabular-nums;
        }
        .article-skel { font-size: 12.5px; color: var(--ink-faint); padding: 12px 6px; }

        .collab-link { font-size: 13px; font-weight: 500; color: var(--accent); }
        .collab-link:hover { text-decoration: underline; }

        /* Tablet */
        @media (max-width: 900px) {
            .span-4, .span-6, .span-8 { grid-column: span 6; }
            .projects-shell { grid-template-columns: 1fr; }
            .projects-sidebar { position: static; display: flex; flex-wrap: wrap; gap: 6px; }
            .project-nav-item { width: auto; }
        }

        /* Mobile */
        @media (max-width: 620px) {
            main { padding: 1rem 1rem 2.5rem; }
            .grid { gap: 12px; }
            .cform .frow { grid-template-columns: 1fr; }
            .topbar { padding: 0.8rem 1rem; gap: 0.75rem; }
            .topnav { flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; }
            .topnav::-webkit-scrollbar { display: none; }
            .topnav button { flex: 0 0 auto; }
            .span-4, .span-6, .span-8, .span-12 { grid-column: span 12; }
            .tile, .project-detail { padding: 1.3rem; }
            .tile-hero { flex-direction: column; }
            .demo-embed iframe { height: 320px; }
            .stat-strip { gap: 1.3rem; }
        }

        @media (prefers-reduced-motion: reduce) {
            .view.active .tile, .view.active .projects-sidebar, .view.active .project-detail,
            .project-detail.swap > *, .avatar-ring::before, .badge-live::before, .kin-l { animation: none !important; }
            .donut-svg .seg { transition: stroke-width 160ms ease, opacity 160ms ease; }
            .tile, .hero-links a, .jump-links button, .project-nav-item, .magnetic { transition: none; }
        }
    </style>
</head>
<body>
    <canvas id="bg-net" aria-hidden="true"></canvas>
    <div class="bg-glow a" aria-hidden="true"></div>
    <div class="bg-glow b" aria-hidden="true"></div>

    <nav class="topbar">
        <span class="wordmark" id="wordmark">PORTFOLIO<span class="dot">.</span></span>
        <div class="topnav" id="topnav">
            <span class="nav-pill" id="nav-pill" aria-hidden="true"></span>
            <button data-view="home">Home</button>
            <button data-view="projects">Projects</button>
            <button data-view="research">Research</button>
            <button data-view="education">Education</button>
            <button data-view="writing">Writing</button>
            <button data-view="contact">Contact</button>
        </div>
    </nav>

    <main id="app">
        <div class="data-error" id="loading">Loading…</div>
    </main>

    <script>
    (function () {
        var VIEWS = ['home', 'projects', 'research', 'education', 'writing', 'contact'];
        var app = document.getElementById('app');
        var topnav = document.getElementById('topnav');
        var navPill = document.getElementById('nav-pill');
        var currentProjectId = null;
        var DATA = null;
        var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        // Theme-aware language colors (validated palette); unknown languages fall back to JSON color.
        var LANG_VARS = {
            'Python': '--lang-python', 'JavaScript': '--lang-js', 'Kotlin': '--lang-kotlin',
            'TypeScript': '--lang-ts', 'HTML': '--lang-html', 'Other': '--lang-other'
        };

        function langColor(stat) {
            var v = LANG_VARS[stat.name];
            if (v) return getComputedStyle(document.documentElement).getPropertyValue(v).trim() || stat.color;
            return stat.color;
        }

        function esc(s) {
            return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
            });
        }

        /* ---------- SVG donut ---------- */

        function donutSvg(stats) {
            var R = 46, C = 2 * Math.PI * R, GAP = 2.5;
            var acc = 0;
            var segs = stats.map(function (s, i) {
                var len = Math.max((s.pct / 100) * C - GAP, 1.5);
                var offset = -(acc / 100) * C - GAP / 2;
                acc += s.pct;
                return '<circle class="seg" data-i="' + i + '" cx="64" cy="64" r="' + R + '" ' +
                    'stroke="' + esc(langColor(s)) + '" ' +
                    'stroke-dasharray="' + len.toFixed(2) + ' ' + C.toFixed(2) + '" ' +
                    'stroke-dashoffset="' + (reduceMotion ? offset.toFixed(2) : (offset + C).toFixed(2)) + '" ' +
                    'data-target="' + offset.toFixed(2) + '" ' +
                    'transform="rotate(-90 64 64)"><title>' + esc(s.name) + ' ' + s.pct + '%</title></circle>';
            }).join('');
            var top = stats[0] || { name: '', pct: 0 };
            return '<svg class="donut-svg" viewBox="0 0 128 128" role="img" aria-label="Language usage: ' +
                esc(stats.map(function (s) { return s.name + ' ' + s.pct + '%'; }).join(', ')) + '">' +
                segs +
                '<g class="donut-center"><text x="64" y="62" text-anchor="middle"><tspan style="font-family:Sora,Inter,sans-serif;font-size:21px;font-weight:700" fill="currentColor">' + Math.round(top.pct) + '%</tspan></text>' +
                '<text x="64" y="78" text-anchor="middle" style="font-size:9.5px;font-weight:500" opacity="0.55" fill="currentColor">' + esc(top.name) + '</text></g>' +
                '</svg>';
        }

        function activateDonut(container) {
            var svg = container.querySelector('.donut-svg');
            if (!svg) return;
            var tip = container.querySelector('.donut-tip');
            var stats = DATA.languages.stats;
            if (!reduceMotion) {
                requestAnimationFrame(function () {
                    requestAnimationFrame(function () {
                        svg.querySelectorAll('.seg').forEach(function (seg) {
                            seg.style.strokeDashoffset = seg.dataset.target;
                        });
                    });
                });
            }
            svg.querySelectorAll('.seg').forEach(function (seg) {
                seg.addEventListener('mousemove', function (e) {
                    var s = stats[+seg.dataset.i];
                    if (!s || !tip) return;
                    var rect = container.getBoundingClientRect();
                    tip.innerHTML = esc(s.name) + ' <span class="pct">' + s.pct + '%</span>';
                    tip.style.display = 'block';
                    tip.style.left = Math.min(e.clientX - rect.left + 14, rect.width - 110) + 'px';
                    tip.style.top = (e.clientY - rect.top - 8) + 'px';
                    svg.classList.add('dimmed');
                });
                seg.addEventListener('mouseleave', function () {
                    if (tip) tip.style.display = 'none';
                    svg.classList.remove('dimmed');
                });
            });
            // legend hover highlights matching segment
            container.querySelectorAll('.lang-chip').forEach(function (chip) {
                chip.addEventListener('mouseenter', function () {
                    var seg = svg.querySelector('.seg[data-i="' + chip.dataset.i + '"]');
                    if (seg) { seg.classList.add('hl'); svg.classList.add('dimmed'); }
                });
                chip.addEventListener('mouseleave', function () {
                    var seg = svg.querySelector('.seg[data-i="' + chip.dataset.i + '"]');
                    if (seg) seg.classList.remove('hl');
                    svg.classList.remove('dimmed');
                });
            });
        }

        /* ---------- views ---------- */

        function hexLerp(a, b, t) {
            function px(h) { h = h.replace('#', ''); if (h.length === 3) h = h.replace(/./g, function (c) { return c + c; }); return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)]; }
            var A = px(a), B = px(b);
            return 'rgb(' + A.map(function (v, i) { return Math.round(v + (B[i] - v) * t); }).join(',') + ')';
        }

        function kineticName(name) {
            // gradient is computed per-letter because animated letter spans get their
            // own paint layers, which breaks background-clip:text on the parent
            var css = getComputedStyle(document.documentElement);
            var ink = css.getPropertyValue('--ink').trim();
            var acc = css.getPropertyValue('--accent').trim();
            var acc2 = css.getPropertyValue('--accent-2').trim();
            var total = String(name).replace(/ /g, '').length || 1;
            var d = 0, li = 0;
            return String(name).split(' ').map(function (word) {
                var letters = word.split('').map(function (ch) {
                    var t = li++ / Math.max(total - 1, 1);
                    var color = t < 0.5 ? ink : (t < 0.85 ? hexLerp(acc, acc, 0) : hexLerp(acc, acc2, (t - 0.85) / 0.15));
                    if (t >= 0.5 && t < 0.85) color = hexLerp(ink, acc, (t - 0.5) / 0.35);
                    return '<span class="kin-l" style="--d:' + (d++) + ';color:' + color + '">' + esc(ch) + '</span>';
                }).join('');
                d += 2;
                return '<span class="kin-w">' + letters + '</span>';
            }).join(' ');
        }

        function renderHome() {
            var p = DATA.profile;
            var initials = esc(p.initials || '');
            var liveCount = DATA.projects.filter(function (x) { return x.demoUrl; }).length;
            return (
                '<div class="grid">' +
                '<div class="tile tile-hero span-8" style="--i:0">' +
                    '<div class="avatar-ring"><div class="avatar">' +
                        '<img src="' + esc(p.avatar) + '" alt="Photo of ' + esc(p.name) + '" onerror="this.style.display=\'none\'">' +
                        '<span class="avatar-fallback">' + initials + '</span>' +
                    '</div></div>' +
                    '<div class="hero-body">' +
                        '<p class="eyebrow">' + esc((p.roles || [])[0] || '') + '</p>' +
                        '<h1>' + kineticName(p.name) + '</h1>' +
                        '<div class="role-row">' + (p.roles || []).map(function (r) { return '<span class="role-chip">' + esc(r) + '</span>'; }).join('') + '</div>' +
                        '<p class="lede tag-line">' + esc(p.tagline) + '</p>' +
                        (p.bio || []).map(function (para) { return '<p class="lede">' + esc(para) + '</p>'; }).join('') +
                        '<p class="loc">' + esc(p.location) + '</p>' +
                        '<div class="stat-strip">' +
                            '<div class="stat"><b data-count="20">20M+</b><span>records processed</span></div>' +
                            '<div class="stat"><b>' + DATA.projects.length + '</b><span>featured projects</span></div>' +
                            '<div class="stat"><b>' + liveCount + '</b><span>live demos</span></div>' +
                            '<div class="stat"><b>' + DATA.languages.repoCount + '</b><span>repos scanned</span></div>' +
                        '</div>' +
                        '<div class="hero-links">' +
                            (p.links || []).map(function (l) {
                                var external = /^https?:/.test(l.url);
                                return '<a class="magnetic" href="' + esc(l.url) + '"' + (external ? ' target="_blank" rel="noopener"' : '') + '>' + esc(l.label) + '</a>';
                            }).join('') +
                        '</div>' +
                        '<div class="jump-links">' +
                            '<button class="primary magnetic" data-view="projects">See my projects →</button>' +
                            '<button class="ghost magnetic" data-view="research">Research & thesis →</button>' +
                            '<button class="ghost magnetic" data-view="contact">Request my CV →</button>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
                '<div class="tile span-4" style="--i:1">' +
                    '<h2 class="section-title">Languages · across all repos</h2>' +
                    '<div class="donut-wrap" id="donut-wrap">' +
                        donutSvg(DATA.languages.stats) +
                        '<div class="lang-legend">' +
                            DATA.languages.stats.map(function (s, i) {
                                return '<span class="lang-chip" data-i="' + i + '"><span class="lang-chip-name"><span class="lang-dot" style="background:' + esc(langColor(s)) + '"></span>' + esc(s.name) + '</span><span class="lang-chip-pct">' + s.pct + '%</span></span>';
                            }).join('') +
                        '</div>' +
                        '<div class="donut-tip"></div>' +
                    '</div>' +
                    '<p class="lang-note">' + esc(DATA.languages.note) + ' (' + DATA.languages.repoCount + ' repos, updated ' + esc(DATA.languages.updatedAt) + ')</p>' +
                    '<h2 class="section-title">Focus areas</h2>' +
                    '<div class="tag-row">' + DATA.focusAreas.map(function (t) { return '<span class="tag">' + esc(t) + '</span>'; }).join('') + '</div>' +
                '</div>' +
                '</div>'
            );
        }

        function projectDemoBlock(proj) {
            if (!proj.demoUrl) return '';
            return (
                '<div class="demo-embed">' +
                    '<div class="chrome-bar">' +
                        '<span class="chrome-dot r"></span><span class="chrome-dot y"></span><span class="chrome-dot g"></span>' +
                        '<span class="chrome-url"><a href="' + esc(proj.demoUrl) + '" target="_blank" rel="noopener">' + esc(proj.demoUrl.replace(/^https?:\/\//, '')) + '</a></span>' +
                    '</div>' +
                    '<div class="demo-loading"><div class="spinner"></div></div>' +
                    '<iframe src="' + esc(proj.demoUrl) + '" loading="lazy" title="Live demo of ' + esc(proj.name) + '" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>' +
                '</div>'
            );
        }

        function projectDetailHtml(proj) {
            var badge = proj.visibility === 'private'
                ? '<span class="badge badge-private">🔒 Private</span>'
                : (proj.demoUrl ? '<span class="badge badge-live">Live Demo</span>' : '');
            var story = '<strong>Problem:</strong> ' + esc(proj.problem) + ' <strong>Approach:</strong> ' + esc(proj.approach) + ' <strong>Outcome:</strong> ' + esc(proj.outcome);
            var actions = '';
            if (proj.demoUrl) actions += '<a href="' + esc(proj.demoUrl) + '" target="_blank" rel="noopener">Open in new tab ↗</a>';
            if (proj.repoUrl) actions += '<a href="' + esc(proj.repoUrl) + '" target="_blank" rel="noopener">View on GitHub</a>';
            if (!proj.demoUrl && !proj.repoUrl) actions = '<span class="private-note">Not yet public.</span>';
            actions += '<button class="collab-link" data-collab="' + esc(proj.name) + '">🤝 Collaborate on this</button>';

            return (
                '<div class="card-head"><h3>' + esc(proj.name) + '</h3>' + badge + '</div>' +
                projectDemoBlock(proj) +
                '<p class="card-summary">' + esc(proj.summary) + '</p>' +
                '<p class="card-story">' + story + '</p>' +
                '<p class="card-meta">' + esc(proj.stack) + '</p>' +
                '<div class="card-actions">' + actions + '</div>'
            );
        }

        function renderProjectsSidebar() {
            return DATA.projects.map(function (proj) {
                var dotClass = proj.visibility === 'private' ? 'private' : 'live';
                var active = proj.id === currentProjectId ? ' active' : '';
                return '<button class="project-nav-item' + active + '" data-project="' + esc(proj.id) + '">' +
                    '<span>' + esc(proj.name) + '</span><span class="dot ' + dotClass + '"></span></button>';
            }).join('');
        }

        function renderProjects() {
            if (!currentProjectId && DATA.projects.length) currentProjectId = DATA.projects[0].id;
            var proj = DATA.projects.find(function (p) { return p.id === currentProjectId; }) || DATA.projects[0];
            return (
                '<div class="projects-shell">' +
                    '<div class="projects-sidebar" id="projects-sidebar" style="--i:0">' + renderProjectsSidebar() + '</div>' +
                    '<div class="project-detail" id="project-detail" style="--i:1">' + (proj ? projectDetailHtml(proj) : '') + '</div>' +
                '</div>'
            );
        }

        function selectProject(id) {
            currentProjectId = id;
            document.getElementById('projects-sidebar').innerHTML = renderProjectsSidebar();
            var proj = DATA.projects.find(function (p) { return p.id === id; });
            var detail = document.getElementById('project-detail');
            detail.classList.remove('swap');
            detail.innerHTML = proj ? projectDetailHtml(proj) : '';
            void detail.offsetWidth;
            detail.classList.add('swap');
            bindProjectSidebar();
            bindDemoLoaders(detail);
        }

        function bindProjectSidebar() {
            var sidebar = document.getElementById('projects-sidebar');
            if (!sidebar) return;
            sidebar.querySelectorAll('[data-project]').forEach(function (btn) {
                btn.addEventListener('click', function () { selectProject(btn.dataset.project); });
            });
        }

        function bindDemoLoaders(scope) {
            (scope || document).querySelectorAll('.demo-embed iframe').forEach(function (fr) {
                fr.addEventListener('load', function () {
                    var loading = fr.parentElement.querySelector('.demo-loading');
                    if (loading) loading.style.display = 'none';
                });
            });
        }

        function renderResearch() {
            var html = '<div class="grid">';
            var offset = 0;
            if (DATA.thesis) {
                html += '<div class="tile span-12" style="--i:0">' +
                    '<div class="card-head"><h3>' + esc(DATA.thesis.title) + '</h3><span class="badge badge-live">Interactive</span></div>' +
                    '<p class="card-summary">' + esc(DATA.thesis.summary) + '</p>' +
                    '<div class="demo-embed">' +
                        '<div class="chrome-bar">' +
                            '<span class="chrome-dot r"></span><span class="chrome-dot y"></span><span class="chrome-dot g"></span>' +
                            '<span class="chrome-url"><a href="' + esc(DATA.thesis.url) + '" target="_blank" rel="noopener">' + esc(DATA.thesis.url) + '</a></span>' +
                        '</div>' +
                        '<div class="demo-loading"><div class="spinner"></div></div>' +
                        '<iframe src="' + esc(DATA.thesis.url) + '?embed=1" loading="lazy" title="' + esc(DATA.thesis.title) + '" style="height:540px" sandbox="allow-scripts allow-same-origin"></iframe>' +
                    '</div>' +
                    '<div class="card-actions"><a href="' + esc(DATA.thesis.url) + '" target="_blank" rel="noopener">Open full page ↗</a></div>' +
                '</div>';
                offset = 1;
            }
            html += DATA.research.map(function (r, i) {
                return '<div class="tile tile-research span-4" style="--i:' + (i + offset) + '"><h3>' + esc(r.name) + '</h3><p class="desc">' + esc(r.desc) + '</p><p class="meta">' + esc(r.meta) + '</p></div>';
            }).join('') + '</div>';
            return html;
        }

        function renderEducation() {
            return '<div class="grid"><div class="tile span-12" style="--i:0"><h2 class="section-title">Education & Credentials</h2><div class="timeline">' +
                DATA.education.map(function (e) {
                    return '<div class="timeline-item"><h3>' + esc(e.name) + '</h3><p>' + esc(e.meta) + '</p></div>';
                }).join('') + '</div></div></div>';
        }

        var mediumCache = null;

        function renderWriting() {
            return '<div class="grid">' +
                '<div class="tile span-4" style="--i:0"><h2 class="section-title">Writing & Community</h2>' +
                    '<p class="writing-text">' + esc(DATA.writing.text) + '</p>' +
                    '<a href="' + esc(DATA.writing.url) + '" target="_blank" rel="noopener" class="accent-link">Browse all on Medium ↗</a>' +
                '</div>' +
                '<div class="tile span-8" style="--i:1"><h2 class="section-title">Latest articles</h2>' +
                    '<div class="article-list" id="medium-list"><div class="article-skel">Loading latest articles…</div></div>' +
                '</div>' +
            '</div>';
        }

        function loadMedium() {
            var list = document.getElementById('medium-list');
            if (!list) return;
            function render(articles) {
                if (!articles.length) {
                    list.innerHTML = '<div class="article-skel">Couldn’t load articles right now — <a class="accent-link" href="' + esc(DATA.writing.url) + '" target="_blank" rel="noopener">browse on Medium ↗</a></div>';
                    return;
                }
                list.innerHTML = articles.map(function (a) {
                    return '<a class="article-item" href="' + esc(a.url) + '" target="_blank" rel="noopener">' +
                        '<span class="a-title">' + esc(a.title) + '</span>' +
                        (a.date ? '<span class="a-date">' + esc(a.date) + '</span>' : '') +
                    '</a>';
                }).join('');
            }
            if (mediumCache) { render(mediumCache); return; }
            fetch('api/medium')
                .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
                .then(function (data) { mediumCache = data.articles || []; render(mediumCache); })
                .catch(function () { render([]); });
        }

        var contactPrefill = null;

        function renderContact() {
            var c = DATA.contact;
            var p = DATA.profile;
            var pre = contactPrefill || {};
            contactPrefill = null;
            var social = (p.links || []).filter(function (l) { return /^https?:/.test(l.url); });
            return '<div class="grid">' +
                '<div class="tile span-8" style="--i:0">' +
                    '<h2 class="section-title">Send a message</h2>' +
                    '<form class="cform" id="contact-form" novalidate>' +
                        '<div class="frow">' +
                            '<div class="fgroup"><label for="cf-name">Name</label><input id="cf-name" name="name" required maxlength="80" autocomplete="name"></div>' +
                            '<div class="fgroup"><label for="cf-email">Email</label><input id="cf-email" name="email" type="email" required maxlength="120" autocomplete="email"></div>' +
                        '</div>' +
                        '<div class="fgroup"><label for="cf-subject">Subject</label><input id="cf-subject" name="subject" maxlength="140" value="' + esc(pre.subject || '') + '"></div>' +
                        '<div class="fgroup"><label for="cf-message">Message</label><textarea id="cf-message" name="message" required maxlength="4000">' + esc(pre.message || '') + '</textarea></div>' +
                        '<input class="hp" name="website" tabindex="-1" autocomplete="off" aria-hidden="true">' +
                        '<button class="submit-btn magnetic" type="submit">Send message →</button>' +
                        '<p class="form-status" id="contact-status" role="status"></p>' +
                    '</form>' +
                '</div>' +
                '<div class="tile span-4" style="--i:1">' +
                    '<h2 class="section-title">Direct</h2>' +
                    '<div class="contact-direct">' +
                        '<a href="mailto:' + esc(c.email) + '"><span class="ico">✉️</span>' + esc(c.email) + '</a>' +
                        '<a href="tel:' + esc(c.phone.replace(/\s/g, '')) + '"><span class="ico">📞</span>' + esc(c.phone) + '</a>' +
                        social.map(function (l) {
                            return '<a href="' + esc(l.url) + '" target="_blank" rel="noopener"><span class="ico">🔗</span>' + esc(l.label) + '</a>';
                        }).join('') +
                    '</div>' +
                    '<h2 class="section-title">Request my CV</h2>' +
                    '<p class="lang-note" style="margin-bottom:0.8rem">Approved requests receive the CV by email — usually within a day.</p>' +
                    '<form class="cform" id="cv-form" novalidate>' +
                        '<div class="fgroup"><label for="cv-name">Name</label><input id="cv-name" name="name" required maxlength="80"></div>' +
                        '<div class="fgroup"><label for="cv-email">Email</label><input id="cv-email" name="email" type="email" required maxlength="120"></div>' +
                        '<div class="fgroup"><label for="cv-reason">What’s it for? (optional)</label><input id="cv-reason" name="reason" maxlength="600" placeholder="Role, company, project…"></div>' +
                        '<input class="hp" name="website" tabindex="-1" autocomplete="off" aria-hidden="true">' +
                        '<button class="submit-btn" type="submit">Request CV →</button>' +
                        '<p class="form-status" id="cv-status" role="status"></p>' +
                    '</form>' +
                '</div>' +
            '</div>';
        }

        function bindForm(formId, statusId, endpoint, fields, okMsg, fallback) {
            var form = document.getElementById(formId);
            if (!form) return;
            var status = document.getElementById(statusId);
            form.addEventListener('submit', function (e) {
                e.preventDefault();
                var body = {};
                var valid = true;
                fields.forEach(function (f) {
                    var el = form.elements[f.name];
                    body[f.name] = el ? el.value.trim() : '';
                    if (f.required && !body[f.name]) valid = false;
                    if (f.email && !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(body[f.name])) valid = false;
                });
                body.website = form.elements.website ? form.elements.website.value : '';
                if (!valid) {
                    status.className = 'form-status err';
                    status.textContent = 'Please fill in the required fields with a valid email.';
                    return;
                }
                var btn = form.querySelector('.submit-btn');
                btn.disabled = true;
                status.className = 'form-status';
                status.textContent = 'Sending…';
                fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                })
                .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
                .then(function (res) {
                    if (!res.ok) throw new Error(res.j.error || 'Failed');
                    status.className = 'form-status ok';
                    status.textContent = okMsg;
                    form.reset();
                })
                .catch(function () {
                    status.className = 'form-status err';
                    status.textContent = fallback;
                })
                .then(function () { btn.disabled = false; });
            });
        }

        function bindContact() {
            var email = DATA.contact.email;
            bindForm('contact-form', 'contact-status', 'api/contact',
                [{ name: 'name', required: true }, { name: 'email', required: true, email: true }, { name: 'subject' }, { name: 'message', required: true }],
                'Sent — I’ll get back to you soon.',
                'Couldn’t send right now — email me directly at ' + email + '.');
            bindForm('cv-form', 'cv-status', 'api/cv',
                [{ name: 'name', required: true }, { name: 'email', required: true, email: true }, { name: 'reason' }],
                'Request received — you’ll get the CV by email once approved.',
                'Couldn’t send right now — email me directly at ' + email + '.');
        }

        var RENDERERS = { home: renderHome, projects: renderProjects, research: renderResearch, education: renderEducation, writing: renderWriting, contact: renderContact };

        var finePointer = window.matchMedia('(pointer: fine)').matches;

        function bindTilt() {
            if (reduceMotion || !finePointer) return;
            document.querySelectorAll('.view.active .tile').forEach(function (el) {
                if (el.querySelector('iframe')) return;
                var MAX = 3.5;
                el.addEventListener('mousemove', function (e) {
                    el.style.animation = 'none';
                    var r = el.getBoundingClientRect();
                    var px = (e.clientX - r.left) / r.width - 0.5;
                    var py = (e.clientY - r.top) / r.height - 0.5;
                    var k = Math.min(1, 420 / r.width);
                    el.style.transform = 'perspective(900px) rotateX(' + (-py * MAX * k).toFixed(2) + 'deg) rotateY(' + (px * MAX * k).toFixed(2) + 'deg) translateY(-3px)';
                });
                el.addEventListener('mouseleave', function () { el.style.transform = ''; });
            });
        }

        function bindMagnetic() {
            if (reduceMotion || !finePointer) return;
            document.querySelectorAll('.view.active .magnetic').forEach(function (el) {
                el.addEventListener('mousemove', function (e) {
                    var r = el.getBoundingClientRect();
                    var dx = (e.clientX - (r.left + r.width / 2)) / r.width;
                    var dy = (e.clientY - (r.top + r.height / 2)) / r.height;
                    el.style.transform = 'translate(' + (dx * 8).toFixed(1) + 'px,' + (dy * 6).toFixed(1) + 'px)';
                });
                el.addEventListener('mouseleave', function () { el.style.transform = ''; });
            });
        }

        function movePill(name) {
            var btn = topnav.querySelector('button[data-view="' + name + '"]');
            if (!btn) return;
            navPill.style.left = btn.offsetLeft + 'px';
            navPill.style.width = btn.offsetWidth + 'px';
        }

        function showView(name) {
            if (VIEWS.indexOf(name) === -1) name = 'home';
            app.innerHTML = '<div class="view active" id="view-' + name + '">' + RENDERERS[name]() + '</div>';
            if (name === 'projects' || name === 'research') { bindProjectSidebar(); bindDemoLoaders(); }
            if (name === 'home') activateDonut(document.getElementById('donut-wrap'));
            if (name === 'writing') loadMedium();
            if (name === 'contact') bindContact();
            bindTilt();
            bindMagnetic();
            topnav.querySelectorAll('button').forEach(function (b) {
                b.classList.toggle('active', b.dataset.view === name);
            });
            movePill(name);
            if (location.hash.slice(1) !== name) history.replaceState(null, '', '#' + name);
            window.scrollTo({ top: 0, behavior: 'auto' });
        }

        function bindNav() {
            document.body.addEventListener('click', function (e) {
                var collab = e.target.closest('[data-collab]');
                if (collab) {
                    contactPrefill = {
                        subject: 'Collaboration: ' + collab.dataset.collab,
                        message: 'Hi Brian,\n\nI’d like to collaborate on ' + collab.dataset.collab + ' — ',
                    };
                    showView('contact');
                    return;
                }
                var btn = e.target.closest('[data-view]');
                if (btn) showView(btn.dataset.view);
            });
            window.addEventListener('hashchange', function () { showView(location.hash.slice(1)); });
            window.addEventListener('resize', function () {
                var active = topnav.querySelector('button.active');
                if (active) movePill(active.dataset.view);
            });
        }

        /* ---------- node-network background ---------- */

        function initNetwork() {
            var canvas = document.getElementById('bg-net');
            var ctx = canvas.getContext('2d');
            var dpr = Math.min(window.devicePixelRatio || 1, 2);
            var W, H, nodes = [], pulses = [];
            var LINK_DIST = 160;

            function cssVar(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
            var colors = {};
            function refreshColors() {
                colors.node = cssVar('--net-node');
                colors.line = cssVar('--net-line');
                colors.pulse = cssVar('--net-pulse');
            }
            refreshColors();
            if (window.matchMedia) {
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', refreshColors);
            }

            function resize() {
                W = window.innerWidth; H = window.innerHeight;
                canvas.width = W * dpr; canvas.height = H * dpr;
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                var target = Math.min(64, Math.max(18, Math.round(W * H / 26000)));
                while (nodes.length < target) {
                    nodes.push({ x: Math.random() * W, y: Math.random() * H, vx: (Math.random() - 0.5) * 0.22, vy: (Math.random() - 0.5) * 0.22 });
                }
                nodes.length = target;
            }
            resize();
            window.addEventListener('resize', resize);

            // floating wireframe icosahedron (hero accent)
            var PHI = (1 + Math.sqrt(5)) / 2;
            var ICO_V = [
                [-1, PHI, 0], [1, PHI, 0], [-1, -PHI, 0], [1, -PHI, 0],
                [0, -1, PHI], [0, 1, PHI], [0, -1, -PHI], [0, 1, -PHI],
                [PHI, 0, -1], [PHI, 0, 1], [-PHI, 0, -1], [-PHI, 0, 1]
            ];
            var ICO_E = [];
            for (var ea = 0; ea < 12; ea++) {
                for (var eb = ea + 1; eb < 12; eb++) {
                    var dx0 = ICO_V[ea][0] - ICO_V[eb][0], dy0 = ICO_V[ea][1] - ICO_V[eb][1], dz0 = ICO_V[ea][2] - ICO_V[eb][2];
                    if (Math.abs(dx0 * dx0 + dy0 * dy0 + dz0 * dz0 - 4) < 0.01) ICO_E.push([ea, eb]);
                }
            }
            var wfAngle = 0.6;

            function drawWireframe(animate) {
                if (W < 760) return;
                if (animate) wfAngle += 0.0035;
                var cx = W * 0.86, cy = Math.min(H * 0.26, 250), s = Math.min(W, H) * 0.085;
                var ca = Math.cos(wfAngle), sa = Math.sin(wfAngle);
                var cb = Math.cos(wfAngle * 0.63), sb = Math.sin(wfAngle * 0.63);
                var pts = ICO_V.map(function (v) {
                    var x = v[0] * ca + v[2] * sa, z = -v[0] * sa + v[2] * ca, y = v[1];
                    var y2 = y * cb - z * sb, z2 = y * sb + z * cb;
                    var depth = (z2 + PHI) / (2 * PHI);
                    return { x: cx + x * s / PHI, y: cy + y2 * s / PHI, d: depth };
                });
                ctx.lineWidth = 1;
                ctx.strokeStyle = colors.pulse;
                ICO_E.forEach(function (e) {
                    var p = pts[e[0]], q = pts[e[1]];
                    ctx.globalAlpha = 0.06 + 0.13 * ((p.d + q.d) / 2);
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(q.x, q.y);
                    ctx.stroke();
                });
                ctx.fillStyle = colors.pulse;
                pts.forEach(function (p) {
                    ctx.globalAlpha = 0.12 + 0.25 * p.d;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 1.7, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.globalAlpha = 1;
            }

            function drawFrame(animate) {
                ctx.clearRect(0, 0, W, H);
                for (var i = 0; i < nodes.length; i++) {
                    var n = nodes[i];
                    if (animate) {
                        n.x += n.vx; n.y += n.vy;
                        if (n.x < -10) n.x = W + 10; if (n.x > W + 10) n.x = -10;
                        if (n.y < -10) n.y = H + 10; if (n.y > H + 10) n.y = -10;
                    }
                }
                ctx.lineWidth = 1;
                for (var a = 0; a < nodes.length; a++) {
                    for (var b = a + 1; b < nodes.length; b++) {
                        var dx = nodes[a].x - nodes[b].x, dy = nodes[a].y - nodes[b].y;
                        var d2 = dx * dx + dy * dy;
                        if (d2 < LINK_DIST * LINK_DIST) {
                            var alpha = 1 - Math.sqrt(d2) / LINK_DIST;
                            ctx.globalAlpha = alpha;
                            ctx.strokeStyle = colors.line;
                            ctx.beginPath();
                            ctx.moveTo(nodes[a].x, nodes[a].y);
                            ctx.lineTo(nodes[b].x, nodes[b].y);
                            ctx.stroke();
                        }
                    }
                }
                ctx.globalAlpha = 1;
                ctx.fillStyle = colors.node;
                for (var k = 0; k < nodes.length; k++) {
                    ctx.beginPath();
                    ctx.arc(nodes[k].x, nodes[k].y, 1.8, 0, Math.PI * 2);
                    ctx.fill();
                }
                drawWireframe(animate);
                if (animate) {
                    // occasionally send a pulse along a random nearby pair
                    if (pulses.length < 4 && Math.random() < 0.02) {
                        for (var tries = 0; tries < 12; tries++) {
                            var i1 = (Math.random() * nodes.length) | 0, i2 = (Math.random() * nodes.length) | 0;
                            if (i1 === i2) continue;
                            var ddx = nodes[i1].x - nodes[i2].x, ddy = nodes[i1].y - nodes[i2].y;
                            if (ddx * ddx + ddy * ddy < LINK_DIST * LINK_DIST) {
                                pulses.push({ a: i1, b: i2, t: 0 });
                                break;
                            }
                        }
                    }
                    pulses = pulses.filter(function (pl) {
                        pl.t += 0.016;
                        if (pl.t >= 1) return false;
                        var pa = nodes[pl.a], pb = nodes[pl.b];
                        var px = pa.x + (pb.x - pa.x) * pl.t;
                        var py = pa.y + (pb.y - pa.y) * pl.t;
                        var fade = Math.sin(pl.t * Math.PI);
                        ctx.globalAlpha = fade;
                        ctx.fillStyle = colors.pulse;
                        ctx.beginPath();
                        ctx.arc(px, py, 2.6, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.globalAlpha = fade * 0.3;
                        ctx.beginPath();
                        ctx.arc(px, py, 6, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.globalAlpha = 1;
                        return true;
                    });
                }
            }

            if (reduceMotion) { drawFrame(false); return; }

            function loop() {
                if (!document.hidden) drawFrame(true);
                requestAnimationFrame(loop);
            }
            loop();
        }

        function boot(data) {
            DATA = data;
            var wm = document.getElementById('wordmark');
            wm.innerHTML = esc((data.profile.name || '').toUpperCase()) + '<span class="dot">.</span>';
            document.title = data.profile.name + ' - ' + (data.profile.roles || [])[0];
            bindNav();
            showView(location.hash.slice(1) || 'home');
            initNetwork();
        }

        fetch('data/projects.json')
            .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
            .then(boot)
            .catch(function (err) {
                app.innerHTML = '<div class="data-error">Could not load site content (' + esc(err.message) + '). Try refreshing.</div>';
            });
    })();
    </script>
